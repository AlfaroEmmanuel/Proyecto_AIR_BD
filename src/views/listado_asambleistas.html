<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Atestados - AIR</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f6f9; }
        .search-container { margin-bottom: 25px; display: flex; gap: 10px; }
        input { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #0073e6; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #003366; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .badge { padding: 5px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .active { background-color: #e2fbe8; color: #1e7e34; }
        .inactive { background-color: #fce8e6; color: #bd2130; }
    </style>
</head>
<body>
    <h2>Consulta Pública de Asambleístas e Historial</h2>
    <div class="search-container">
        <input type="text" id="searchCedula" placeholder="Buscar por Cédula...">
        <button onclick="cargarTabla()">Buscar Miembro</button>
        <button style="background-color: #6c757d;" onclick="limpiarFiltro()">Ver Todos</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Cédula</th>
                <th>Nombre Completo</th>
                <th>Correo</th>
                <th>Sector</th>
                <th>Año Gestión</th>
                <th>Estado Nombramiento</th>
            </tr>
        </thead>
        <tbody id="tablaBody">
            </tbody>
    </table>

    <script>
        async function cargarTabla(cedula = '') {
            let url = '/api/asambleistas';
            if (cedula) url += `?cedula=${cedula}`;

            const response = await fetch(url);
            const miembros = await response.json();
            
            const tbody = document.getElementById('tablaBody');
            tbody.innerHTML = '';

            miembros.forEach(m => {
                const nombreCompleto = `${m.nombre} ${m.primer_apellido} ${m.segundo_apellido || ''}`;
                const estadoTxt = m.estado_activo ? 'Activo' : 'Histórico';
                const estadoClass = m.estado_activo ? 'active' : 'inactive';

                tbody.innerHTML += `
                    <tr>
                        <td>${m.cedula}</td>
                        <td>${nombreCompleto}</td>
                        <td>${m.correo_institucional}</td>
                        <td>${m.nombre_sector}</td>
                        <td>${m.anio_gestion}</td>
                        <td><span class="badge ${estadoClass}">${estadoTxt}</span></td>
                    </tr>
                `;
            });
        }

        function limpiarFiltro() {
            document.getElementById('searchCedula').value = '';
            cargarTabla();
        }

        // Carga inicial al abrir la página
        window.onload = () => cargarTabla();
    </script>
</body>
</html>
