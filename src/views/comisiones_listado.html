<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comisiones — AIR</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 1.5rem; color: #1f2937; }
        .contenedor { max-width: 900px; margin: 0 auto; }
        .buscador { margin-bottom: 1.5rem; padding: .55rem .8rem; width: 100%; max-width: 360px; border: 1px solid #ccc; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.1rem; }
        .card h3 { margin: 0 0 .4rem; }
        .card .meta { color: #6b7280; font-size: .85rem; }
        .card a { display: inline-block; margin-top: .8rem; color: #0f2b46; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <main class="contenedor">
        <h1>Comisiones</h1>
        <input type="text" id="buscador" class="buscador" placeholder="Buscar comisión por nombre…">
        <div class="grid" id="grid"><p>Cargando…</p></div>
    </main>

    <script>
        const token = localStorage.getItem('air_token');
        const headers = { 'Authorization': 'Bearer ' + token };
        let comisiones = [];

        async function cargar() {
            const res = await fetch('/api/comisiones', { headers });
            if (res.status === 401) { localStorage.clear(); location.href = '/login.html'; return; }
            const r = await res.json();
            comisiones = r.datos || [];
            render(comisiones);
        }

        function render(lista) {
            const grid = document.getElementById('grid');
            if (!lista.length) { grid.innerHTML = '<p style="color:#9ca3af">Sin comisiones.</p>'; return; }
            grid.innerHTML = lista.map(c => `
                <div class="card">
                    <h3>${c.nombre}</h3>
                    <div class="meta">${c.tipo || 'Sin tipo'} · ${c.total_integrantes} integrante(s)</div>
                    <a href="/comision_detalle.html?id=${c.id_comision}">Ver detalle →</a>
                </div>`).join('');
        }

        document.getElementById('buscador').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            render(comisiones.filter(c => c.nombre.toLowerCase().includes(q)));
        });

        cargar();
    </script>
</body>
</html>
