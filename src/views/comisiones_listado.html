<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comisiones — AIR</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 1.5rem; color: #1f2937; }
        .contenedor { max-width: 900px; margin: 0 auto; }
        .nav-link { color: #3182ce; text-decoration: none; font-size: .9rem; }
        .form { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .row { display: flex; gap: 1rem; flex-wrap: wrap; } .row > div { flex: 1; min-width: 150px; }
        label { display: block; font-size: .85rem; margin: .6rem 0 .3rem; }
        input, select, textarea { width: 100%; padding: .55rem; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        textarea { min-height: 60px; resize: vertical; }
        .btn { margin-top: 1rem; padding: .6rem 1.2rem; background: #0f2b46; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .msg { margin-top: .8rem; font-size: .9rem; }
        .buscador { margin-bottom: 1.5rem; padding: .55rem .8rem; width: 100%; max-width: 360px; border: 1px solid #ccc; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.1rem; }
        .card h3 { margin: 0 0 .4rem; }
        .card .meta { color: #6b7280; font-size: .85rem; }
        .card a { display: inline-block; margin-top: .8rem; color: #0f2b46; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <main class="contenedor">
        <a class="nav-link" href="/inicio.html">← Inicio</a>
        <h1>Comisiones</h1>

        <section class="form solo-gestion" id="formCrear">
            <h2>Nueva comisión</h2>
            <div class="row">
                <div><label>Nombre</label><input id="nombre" placeholder="Comisión de Hacienda"></div>
                <div><label>Tipo</label><select id="tipo"></select></div>
            </div>
            <label>Objeto / descripción</label><textarea id="objeto"></textarea>
            <button class="btn" id="btnCrear">Crear comisión</button>
            <div class="msg" id="msg"></div>
        </section>

        <input type="text" id="buscador" class="buscador" placeholder="Buscar comisión por nombre…">
        <div class="grid" id="grid"><p>Cargando…</p></div>
    </main>

    <script>
        const token = localStorage.getItem('air_token');
        const rol = localStorage.getItem('air_rol');
        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
        if (!token) location.href = '/login.html';
        let comisiones = [];

        // Solo Secretaría/Administrador ven el formulario de creación
        if (rol !== 'Secretaria' && rol !== 'Administrador') {
            document.getElementById('formCrear').style.display = 'none';
        }

        async function api(url, opts = {}) {
            const res = await fetch(url, { headers, ...opts });
            if (res.status === 401) { localStorage.clear(); location.href = '/login.html'; return null; }
            return res.json();
        }

        async function cargarCatalogo() {
            const r = await api('/api/catalogos');
            if (r && r.exito) {
                document.getElementById('tipo').innerHTML =
                    r.datos.tipo_comision.map(t => `<option value="${t.id}">${t.nombre}</option>`).join('');
            }
        }

        async function cargar() {
            const r = await api('/api/comisiones');
            comisiones = (r && r.datos) ? r.datos : [];
            render(comisiones);
        }

        function render(lista) {
            const grid = document.getElementById('grid');
            if (!lista.length) { grid.innerHTML = '<p style="color:#9ca3af">Sin comisiones.</p>'; return; }
            grid.innerHTML = lista.map(c => `
                <div class="card">
                    <h3>${c.nombre}</h3>
                    <div class="meta">${c.tipo || 'Sin tipo'} · ${c.total_integrantes} integrante(s)</div>
                    <a href="/comision_detalle.html?id=${c.id_comision}">Ver detalle →</a>
                </div>`).join('');
        }

        document.getElementById('btnCrear').addEventListener('click', async () => {
            const body = {
                nombre: document.getElementById('nombre').value.trim(),
                objeto: document.getElementById('objeto').value.trim(),
                id_tipo_comision: Number(document.getElementById('tipo').value)
            };
            const msg = document.getElementById('msg');
            if (!body.nombre) { msg.textContent = 'El nombre es obligatorio.'; msg.style.color = '#b3261e'; return; }
            const r = await api('/api/comisiones', { method: 'POST', body: JSON.stringify(body) });
            if (r && r.exito) {
                msg.textContent = `Comisión "${r.datos.nombre}" creada.`; msg.style.color = '#1b7a3d';
                document.getElementById('nombre').value = ''; document.getElementById('objeto').value = '';
                cargar();
            } else {
                msg.textContent = (r && r.mensaje) || 'No se pudo crear.'; msg.style.color = '#b3261e';
            }
        });

        document.getElementById('buscador').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            render(comisiones.filter(c => c.nombre.toLowerCase().includes(q)));
        });

        cargarCatalogo();
        cargar();
    </script>
</body>
</html>
