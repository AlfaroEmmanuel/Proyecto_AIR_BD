<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Sesiones — AIR</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 1.5rem; color: #1f2937; }
        .contenedor { max-width: 920px; margin: 0 auto; }
        .subtitulo { color: #6b7280; }
        .form { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.25rem; margin-bottom: 2rem; }
        .row { display: flex; gap: 1rem; flex-wrap: wrap; }
        .row > div { flex: 1; min-width: 150px; }
        label { display: block; font-size: .85rem; margin: .6rem 0 .3rem; }
        input, select { width: 100%; padding: .55rem; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { margin-top: 1rem; padding: .6rem 1.2rem; background: #0f2b46; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: .6rem .8rem; border-bottom: 1px solid #e5e7eb; text-align: left; font-size: .9rem; }
        th { background: #f5f5f7; }
        td a { color: #0f2b46; font-weight: 600; text-decoration: none; margin-right: .8rem; }
        .msg { margin-top: .8rem; font-size: .9rem; }
        .nav-link { color: #3182ce; text-decoration: none; font-size: .9rem; }
    </style>
</head>
<body>
    <main class="contenedor">
        <a class="nav-link" href="/inicio.html">← Inicio</a>
        <h1>Gestión de Sesiones</h1>
        <p class="subtitulo">Crea sesiones plenarias y entra a su control de asistencia y votaciones.</p>

        <section class="form">
            <h2>Nueva sesión</h2>
            <div class="row">
                <div><label>Número de sesión</label><input id="numero" placeholder="SES-002-2026"></div>
                <div><label>Fecha</label><input type="date" id="fecha"></div>
            </div>
            <div class="row">
                <div><label>Tipo</label><select id="tipo"></select></div>
                <div><label>Modalidad</label><select id="modalidad"></select></div>
                <div><label>Quórum requerido</label><input type="number" id="quorum" min="0" value="2"></div>
            </div>
            <button class="btn" id="btnCrear">Crear sesión</button>
            <div class="msg" id="msg"></div>
        </section>

        <h2>Sesiones registradas</h2>
        <table>
            <thead><tr><th>Número</th><th>Fecha</th><th>Tipo</th><th>Acciones</th></tr></thead>
            <tbody id="tbody"><tr><td colspan="4">Cargando…</td></tr></tbody>
        </table>
    </main>

    <script>
        const token = localStorage.getItem('air_token');
        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
        if (!token) location.href = '/login.html';

        async function api(url, opts = {}) {
            const res = await fetch(url, { headers, ...opts });
            if (res.status === 401) { localStorage.clear(); location.href = '/login.html'; return null; }
            return res.json();
        }

        async function cargarCatalogos() {
            const r = await api('/api/catalogos');
            if (!r || !r.exito) return;
            document.getElementById('tipo').innerHTML =
                r.datos.tipo_sesion.map(t => `<option value="${t.id}">${t.nombre}</option>`).join('');
            document.getElementById('modalidad').innerHTML =
                r.datos.tipo_modalidad.map(t => `<option value="${t.id}">${t.nombre}</option>`).join('');
        }

        async function cargarSesiones() {
            const r = await api('/api/sesiones');
            const lista = (r && r.datos) ? r.datos : [];
            document.getElementById('tbody').innerHTML = lista.length ? lista.map(s => `
                <tr>
                    <td>${s.numero_sesion}</td>
                    <td>${new Date(s.fecha_sesion).toLocaleDateString('es-CR')}</td>
                    <td>${s.tipo}</td>
                    <td>
                        <a href="/sesion_control.html?id=${s.id_sesion}">Control →</a>
                        <a href="/gestion_propuestas.html?sesion=${s.id_sesion}">Agregar propuesta →</a>
                    </td>
                </tr>`).join('') : '<tr><td colspan="4" style="color:#9ca3af">Sin sesiones aún.</td></tr>';
        }

        document.getElementById('btnCrear').addEventListener('click', async () => {
            const body = {
                numero_sesion: document.getElementById('numero').value.trim(),
                fecha_sesion: document.getElementById('fecha').value,
                id_tipo_sesion: Number(document.getElementById('tipo').value),
                id_tipo_modalidad: Number(document.getElementById('modalidad').value),
                quorum_requerido: Number(document.getElementById('quorum').value)
            };
            const msg = document.getElementById('msg');
            if (!body.numero_sesion || !body.fecha_sesion) { msg.textContent = 'Número y fecha son obligatorios.'; msg.style.color = '#b3261e'; return; }
            const r = await api('/api/sesiones', { method: 'POST', body: JSON.stringify(body) });
            if (r && r.exito) {
                msg.textContent = `Sesión ${r.datos.numero_sesion} creada.`; msg.style.color = '#1b7a3d';
                document.getElementById('numero').value = '';
                cargarSesiones();
            } else {
                msg.textContent = (r && r.mensaje) || 'No se pudo crear (¿número repetido?).'; msg.style.color = '#b3261e';
            }
        });

        cargarCatalogos();
        cargarSesiones();
    </script>
</body>
</html>
