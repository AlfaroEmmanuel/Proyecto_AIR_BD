<form id="formLogin">
    <input type="email" id="username" placeholder="Correo institucional" required>
    <input type="password" id="password" placeholder="Contraseña" required>
    <button type="submit">Iniciar Sesión</button>
</form>

<script>
document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

    const data = await response.json();
    if (data.exito) {
        alert(`¡Bienvenido! Rol: ${data.rol}`);
        // Guarda el rol localmente para controlar qué mostrar en la siguiente pantalla
        localStorage.setItem('rolUsuario', data.rol);
        window.location.href = data.redireccion;
    } else {
        alert('Error: ' + data.mensaje); // Notificación en pantalla (Requisito Fase 4)
    }
});
</script>
